name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run ci
      - run: bun run typecheck
      - run: bun test
      # Builds all packages, then validates packaging with publint + attw
      # (exports/types resolve correctly for ESM, CJS, and bundler consumers).
      - run: bun run check:publish
